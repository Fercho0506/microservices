version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: bite-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: finops_db,integration_db,cron_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/create_multiple_dbs.sh:/docker-entrypoint-initdb.d/create_multiple_dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bite-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: bite-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Kong API Gateway (DB-less)
  kong:
    image: kong:3.6
    container_name: bite-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./infrastructure/kong/kong.local.yaml:/kong.yaml
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - finops
      - integration
      - cron-worker

  # FinOps Service — Python/Django (ASR 1 + ASR 2)
  finops:
    build:
      context: ./finops-service
      dockerfile: Dockerfile
    container_name: bite-finops
    environment:
      DB_HOST: postgres
      DB_NAME: finops_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-your-tenant.us.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://bite-finops-api}
      EXPENSES_CACHE_TIMEOUT: 300
      DEBUG: "True"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Cloud Integration Service — Python/Django (ASR 3)
  integration:
    build:
      context: ./cloud-integration-service
      dockerfile: Dockerfile
    container_name: bite-integration
    environment:
      DB_HOST: postgres
      DB_NAME: integration_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      ACTIVE_CLOUD_PROVIDER: aws
      DEBUG: "True"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  # CRON Worker — Node.js/Express (tecnología 2)
  cron-worker:
    build:
      context: ./cron-worker-service-node
      dockerfile: Dockerfile
    container_name: bite-cron-worker
    environment:
      DB_HOST: postgres
      DB_NAME: cron_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      INTEGRATION_SERVICE_URL: http://integration:8081
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
